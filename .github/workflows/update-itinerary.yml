name: Update Itinerary with Claude

on:
  # Runs every day at 9 AM ET (13:00 UTC) automatically
  schedule:
    - cron: '0 13 * * *'

  # Also keep manual trigger for testing / on-demand updates
  workflow_dispatch:
    inputs:
      ratings_json:
        description: 'Override ratings JSON (leave blank to pull from Gist)'
        required: false
      voter_name:
        description: 'Name shown in the update banner'
        required: false
        default: 'the group'
      gist_id:
        description: 'Override Gist ID (leave blank to use GIST_ID secret)'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch ratings from Upstash and update itinerary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KV_URL: ${{ secrets.KV_REST_API_URL }}
          KV_TOK: ${{ secrets.KV_REST_API_TOKEN }}
          RATINGS_OVERRIDE: ${{ inputs.ratings_json }}
          VOTER_NAME_OVERRIDE: ${{ inputs.voter_name }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, datetime

          api_key  = os.environ['ANTHROPIC_API_KEY']
          kv_url   = os.environ.get('KV_URL', '').strip()
          kv_tok   = os.environ.get('KV_TOK', '').strip()
          override = os.environ.get('RATINGS_OVERRIDE', '').strip()
          voter    = os.environ.get('VOTER_NAME_OVERRIDE', '').strip() or 'the group'

          ACT_NAMES = {
            'pool':'Resort Pool + Swim-Up Bar','tennis':'Tennis & Racquetball',
            'basketball':'Basketball Court','spa':'Pure Indulgence Spa',
            'bbq':'Resort BBQ Night','gym':'Fitness Center',
            'catamaran':'Catamaran Snorkel Day','utv':'UTV / ATV Adventure',
            'depalm':'De Palm Island Water Park','parasail':'Parasailing',
            'arashi':'Arashi Beach (self-drive)','mangel':'Mangel Halto Reef Snorkel',
            'flamingo':'Flamingo Beach Day Pass','jeep':'Arikok Jeep Safari + Natural Pool',
            'lighthouse':'California Lighthouse Drive','casibari':'Casibari Rocks + Butterfly Farm',
            'oranjestad':'Oranjestad City Walk','horse':'Horseback Riding',
            'zeerovers':'Zeerovers Pier Fish Lunch','flyfish':'Flying Fishbone Dinner',
            'madame':'Madame Janette (all 17)','lima':'Lima Bistro Farewell Dinner',
            'bugaloe':'Bugaloe Beach Bar','fishing':'Deep Sea Fishing Charter',
            'golf':'Golf','casino':'Casino Night','sunsetsail':'Sunset Sail',
            'yoga':'Eagle Beach Yoga Session','aloe':'Aruba Aloe Factory Tour',
            'screamingeagle':'Screaming Eagle Dinner (Ladies)',
            'manchebo':'Manchebo Beach','elements':'Elements Restaurant',
            'pinchos':'Pinchos Grill & Bar','philipsgarden':"Philip's Animal Garden",
            'turtlewatch':'Sea Turtle Conservation Night Watch',
            'ayorocks':'Ayo Rock Formations','bocsanddunes':'Boca Prins Sand Dunes',
            'kayaksnorkel':'Resort Kayak + Snorkel','shopping':'Oranjestad Shopping',
            'kukoo':'Kukoo Kunuku Pub Crawl (18+)','club':'Club / Nightlife',
          }

          ACT_DAY = {
            'spa':3,'catamaran':2,'utv':3,'fishing':3,'flyfish':3,
            'kukoo':3,'zeerovers':4,'jeep':4,'madame':4,'lima':5,
          }

          # ── Get ratings ──────────────────────────────────────────────────────
          voter_data = []

          if override:
            ratings = json.loads(override)
            voter_data = [{'n': voter, 'r': ratings}]
            print(f"Using manually provided ratings ({len(ratings)} activities)")
          elif kv_url and kv_tok:
            print("Fetching ratings from Upstash KV...")
            req = urllib.request.Request(kv_url, data=json.dumps(['GET','aruba26:votes']).encode(),
              headers={'Authorization': f'Bearer {kv_tok}', 'Content-Type': 'application/json'})
            with urllib.request.urlopen(req, timeout=15) as resp:
              result = json.loads(resp.read())
            raw = result.get('result')
            if not raw:
              print("No votes in KV yet — nothing to do.")
              exit(0)
            all_votes = json.loads(raw)
            voter_data = [v for v in all_votes.values() if v.get('r')]
            if not voter_data:
              print("No rated votes found in KV — nothing to do.")
              exit(0)
            # Aggregate: average of all non-zero votes per activity
            sums, counts = {}, {}
            for vd in voter_data:
              for act_id, score in vd.get('r', {}).items():
                if score > 0:
                  sums[act_id]   = sums.get(act_id, 0) + score
                  counts[act_id] = counts.get(act_id, 0) + 1
            ratings = {act_id: round(sums[act_id] / counts[act_id]) for act_id in sums}
            voter_names = [vd['n'] for vd in voter_data if vd.get('n')]
            voter = ', '.join(voter_names) if voter_names else 'the group'
            print(f"Aggregated {len(ratings)} activities from {len(voter_data)} voter(s): {voter}")
          else:
            print("No KV configured and no ratings_json provided — nothing to do.")
            exit(0)

          if not ratings:
            print("No non-zero ratings found — skipping update.")
            exit(0)

          # ── Build ratings summary for Claude ─────────────────────────────────
          def stars(n): return '★'*n + '☆'*(5-n)

          lines = [f"Total voters: {len(voter_data)}",
                   f"Total activities rated: {len(ratings)}"]
          for score in [5, 4, 3, 2, 1]:
            acts = [(k, v) for k, v in ratings.items() if v == score]
            if acts:
              label = {5:'MUST DO',4:'Really want',3:'Would do',2:'Mild interest',1:'Skip / No interest'}[score]
              lines.append(f"\n{stars(score)} {label}:")
              for k, v in acts:
                name = ACT_NAMES.get(k, k)
                day  = ACT_DAY.get(k)
                suffix = f" (currently Day {day})" if day else " (flexible)"
                vc = counts.get(k, 1) if not override else 1
                lines.append(f"  - {name}{suffix}  [{vc} vote(s), avg {v}★]")

          ratings_text = '\n'.join(lines)

          # ── Read current HTML ─────────────────────────────────────────────────
          with open('index.html', 'r') as f:
            html = f.read()

          p2_match = re.search(r'(<div id="p2" class="page">.*?)(?=<div id="p3")', html, re.DOTALL)
          p2_html  = (p2_match.group(1) if p2_match else '')[:12000]
          today    = datetime.date.today().strftime('%b %d, %Y')

          # ── Call Claude ───────────────────────────────────────────────────────
          prompt = f"""You are updating an Aruba 2026 family trip planner itinerary (HTML).

GROUP ACTIVITY RATINGS (aggregated from {len(voter_data)} voter(s), updated {today}):
Voters: {voter}
{ratings_text}

CURRENT TAB 2 ITINERARY HTML (the <div id="p2"> section, truncated):
{p2_html}

INSTRUCTIONS — return ONLY valid HTML for the complete updated <div id="p2" class="page"> element:
1. Keep the .pg-badge, .pg-title, .pg-desc, #lock-banner, .itin-note, .checklist, options panel, and all day-card divs structurally intact.
2. After the .itin-note div, ADD a div with class "auto-update-banner" and style "background:#E3F2FD;border:1px solid #90CAF9;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#0D47A1" containing: "🤖 Itinerary auto-updated on {today} from {len(voter_data)} voter(s): {voter}. Changes: [list what you changed]."
3. For each day-card: give 5-star activities the best time slots; if a 5-star flexible activity isn't in the plan, add it to the most natural slot.
4. Move 1-star activities OUT of the main slots into their alt-box, OR add a note "(Low group interest — see alt)" next to the slot title.
5. If two 5-star activities would be on the same day, note the conflict in the banner.
6. Do NOT change the Options panel, booking checklist structure, or CSS classes.
7. Return the COMPLETE updated <div id="p2" class="page">...</div> — no other text before or after."""

          payload = json.dumps({
            "model": "claude-sonnet-4-6",
            "max_tokens": 16000,
            "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
            'https://api.anthropic.com/v1/messages',
            data=payload,
            headers={
              'x-api-key': api_key,
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json',
            }
          )

          with urllib.request.urlopen(req, timeout=120) as resp:
            result = json.loads(resp.read())

          new_p2 = result['content'][0]['text'].strip()

          if not new_p2.startswith('<div id="p2"'):
            print("WARNING: Claude response didn't start with <div id=\"p2\"> — skipping replace")
            print("Response preview:", new_p2[:200])
            exit(1)

          new_html = re.sub(
            r'<div id="p2" class="page">.*?(?=<div id="p3")',
            new_p2 + '\n\n',
            html, count=1, flags=re.DOTALL
          )

          with open('index.html', 'w') as f:
            f.write(new_html)

          # ── Update stats.json with voter count ───────────────────────────────
          stats = {'voters': len(voter_data), 'target': 10, 'updated': today}
          with open('stats.json', 'w') as f:
            json.dump(stats, f, indent=2)
          print(f"✅ Itinerary updated from {len(voter_data)} voter(s) on {today}")
          PYEOF

      - name: Commit and push updated itinerary
        run: |
          git config user.email "aruba-bot@noreply.github.com"
          git config user.name "Aruba Trip Planner Bot"
          git add index.html stats.json
          git diff --staged --quiet || git commit -m "Auto-update itinerary — $(date +'%b %d') — ${{ inputs.voter_name || 'scheduled run' }}"
          git push
